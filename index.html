<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EpicTalk | تسجيل الدخول</title>
  <style>
    :root{
      --bg:#070b16; --bg2:#0e1430;
      --panel:rgba(255,255,255,.07); --panel2:rgba(255,255,255,.1);
      --border:rgba(255,255,255,.12);
      --text:#f6f8ff; --muted:#a8b1d1;
      --primary:#7c5cff; --secondary:#24d3ee; --accent:#ff4fd8;
      --success:#30d28c; --danger:#ff5c70; --warning:#ffca5c;
      --radius:24px;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;font-family:"Segoe UI",Tahoma,Arial,sans-serif;color:var(--text)}
    body{
      background:
        radial-gradient(circle at 12% 15%, rgba(124,92,255,.28) 0%, transparent 25%),
        radial-gradient(circle at 88% 12%, rgba(36,211,238,.2) 0%, transparent 20%),
        radial-gradient(circle at 50% 90%, rgba(255,79,216,.18) 0%, transparent 26%),
        linear-gradient(135deg, var(--bg), var(--bg2));
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:20px;
      overflow:hidden;
    }

    /* ── Animated orbs ── */
    .orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;animation:float 8s ease-in-out infinite}
    .orb1{width:400px;height:400px;background:rgba(124,92,255,.15);top:-100px;right:-100px;animation-delay:0s}
    .orb2{width:350px;height:350px;background:rgba(36,211,238,.12);bottom:-80px;left:-80px;animation-delay:3s}
    .orb3{width:250px;height:250px;background:rgba(255,79,216,.1);top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:6s}
    @keyframes float{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-30px) scale(1.05)}}
    .orb3{animation:float2 10s ease-in-out infinite}
    @keyframes float2{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-55%) scale(1.1)}}

    /* ── Card ── */
    .auth-card{
      width:100%;max-width:500px;
      background:rgba(14,20,48,.75);
      border:1px solid var(--border);
      border-radius:32px;
      padding:40px 36px;
      backdrop-filter:blur(24px);
      -webkit-backdrop-filter:blur(24px);
      box-shadow:0 30px 80px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.08);
      position:relative;
      z-index:1;
      animation:cardIn .5s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes cardIn{from{opacity:0;transform:translateY(24px) scale(.97)}to{opacity:1;transform:none}}

    /* ── Brand ── */
    .brand{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:32px}
    .logo{
      width:58px;height:58px;border-radius:18px;
      background:linear-gradient(135deg,var(--primary),var(--secondary),var(--accent));
      display:grid;place-items:center;font-weight:900;font-size:1.5rem;
      box-shadow:0 12px 36px rgba(124,92,255,.4);
    }
    .brand-text h1{font-size:1.6rem;font-weight:900;margin:0}
    .brand-text p{color:var(--muted);font-size:.88rem;margin-top:3px}

    /* ── Tabs ── */
    .tabs{display:flex;gap:4px;background:rgba(255,255,255,.05);border-radius:16px;padding:5px;margin-bottom:28px}
    .tab{flex:1;padding:11px;border:none;border-radius:12px;cursor:pointer;
         font-size:.93rem;font-weight:600;color:var(--muted);background:transparent;transition:.2s}
    .tab.active{background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff;
                box-shadow:0 6px 20px rgba(124,92,255,.35)}

    /* ── Form ── */
    .form-group{margin-bottom:16px}
    label{display:block;font-size:.85rem;color:var(--muted);margin-bottom:7px;font-weight:500}
    .input-wrap{position:relative;display:flex;align-items:center}
    .input-icon{position:absolute;right:14px;color:var(--muted);font-size:1rem;pointer-events:none}
    input[type=text],input[type=email],input[type=password],textarea{
      width:100%;padding:13px 42px 13px 44px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.1);
      border-radius:14px;color:var(--text);
      font-size:.93rem;outline:none;transition:.2s;
      font-family:inherit;
    }
    input:focus,textarea:focus{border-color:var(--primary);background:rgba(124,92,255,.08);box-shadow:0 0 0 3px rgba(124,92,255,.15)}
    input::placeholder{color:#6b75a0}
    .toggle-password{
      position:absolute;left:12px;background:none;border:none;
      color:var(--muted);cursor:pointer;font-size:1rem;padding:4px;
    }

    /* ── Error ── */
    .error-msg{
      display:none;color:var(--danger);font-size:.83rem;
      padding:10px 14px;border-radius:10px;margin-bottom:14px;
      background:rgba(255,92,112,.1);border:1px solid rgba(255,92,112,.2);
    }

    /* ── Buttons ── */
    .btn-primary{
      width:100%;padding:14px;border:none;border-radius:14px;
      background:linear-gradient(135deg,var(--primary),var(--secondary));
      color:#fff;font-size:1rem;font-weight:700;cursor:pointer;
      transition:.25s;box-shadow:0 8px 24px rgba(124,92,255,.35);
      display:flex;align-items:center;justify-content:center;gap:8px;
      margin-top:4px;
    }
    .btn-primary:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 12px 32px rgba(124,92,255,.45)}
    .btn-primary:disabled{opacity:.6;cursor:not-allowed;transform:none}

    .divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--muted);font-size:.85rem}
    .divider::before,.divider::after{content:"";flex:1;height:1px;background:rgba(255,255,255,.1)}

    .btn-google{
      width:100%;padding:13px;border:1px solid rgba(255,255,255,.12);border-radius:14px;
      background:rgba(255,255,255,.05);color:var(--text);font-size:.93rem;font-weight:600;
      cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center;gap:10px;
    }
    .btn-google:hover{background:rgba(255,255,255,.09);border-color:rgba(255,255,255,.18)}

    /* ── Forgot ── */
    .forgot-link{
      text-align:left;margin-top:10px;
    }
    .forgot-link a{color:var(--secondary);font-size:.83rem;text-decoration:none}
    .forgot-link a:hover{text-decoration:underline}

    /* ── Footer ── */
    .auth-footer{text-align:center;margin-top:24px;color:var(--muted);font-size:.83rem;line-height:1.7}
    .auth-footer a{color:var(--secondary);text-decoration:none}

    /* ── Toast ── */
    #toast-container{
      position:fixed;top:20px;left:50%;transform:translateX(-50%);
      z-index:9999;display:flex;flex-direction:column;gap:8px;align-items:center;
    }
    .toast{
      padding:12px 20px;background:rgba(14,20,48,.95);
      border:1px solid rgba(255,255,255,.1);border-left:4px solid #7c5cff;
      border-radius:12px;color:#f6f8ff;font-size:.9rem;
      display:flex;align-items:center;gap:10px;
      backdrop-filter:blur(20px);box-shadow:0 8px 32px rgba(0,0,0,.4);
      opacity:0;transform:translateY(-10px);transition:.35s;max-width:340px;
    }
    .toast.show{opacity:1;transform:translateY(0)}

    /* ── Spinner ── */
    .spinner{
      display:inline-block;width:18px;height:18px;
      border:2px solid rgba(255,255,255,.3);border-top-color:#fff;
      border-radius:50%;animation:spin .7s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── Feature badges ── */
    .features{display:flex;flex-wrap:wrap;gap:8px;margin-top:20px;justify-content:center}
    .feature-badge{
      padding:5px 10px;border-radius:999px;
      background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.09);
      font-size:.78rem;color:var(--muted);
    }

    /* ── Password strength ── */
    .pwd-strength{height:4px;border-radius:4px;margin-top:8px;background:rgba(255,255,255,.08);overflow:hidden}
    .pwd-strength-bar{height:100%;width:0;border-radius:4px;transition:.3s}

    @media(max-width:540px){.auth-card{padding:28px 20px;border-radius:24px}}
  </style>
</head>
<body>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>

  <div id="toast-container"></div>

  <div class="auth-card">
    <!-- Brand -->
    <div class="brand">
      <div class="logo">E</div>
      <div class="brand-text">
        <h1>EpicTalk</h1>
        <p>دردشة ومكالمات فيديو فاخرة</p>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" id="tab-login">تسجيل الدخول</button>
      <button class="tab" id="tab-register">إنشاء حساب</button>
    </div>

    <!-- ── LOGIN FORM ── -->
    <form id="auth-form-login" style="display:flex;flex-direction:column">
      <div class="form-group">
        <label>البريد الإلكتروني</label>
        <div class="input-wrap">
          <span class="input-icon">📧</span>
          <input type="email" id="login-email" placeholder="example@email.com" autocomplete="email" required/>
        </div>
      </div>
      <div class="form-group">
        <label>كلمة المرور</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" required/>
          <button type="button" class="toggle-password">👁</button>
        </div>
      </div>
      <div class="forgot-link"><a href="#" id="forgot-password-link">نسيت كلمة المرور؟</a></div>

      <div class="error-msg" id="login-error"></div>

      <button type="submit" class="btn-primary" id="btn-login" style="margin-top:16px">
        تسجيل الدخول
      </button>

      <div class="divider">أو</div>

      <button type="button" class="btn-google">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        متابعة مع Google
      </button>
    </form>

    <!-- ── REGISTER FORM ── -->
    <form id="auth-form-register" style="display:none;flex-direction:column">
      <div class="form-group">
        <label>الاسم الكامل</label>
        <div class="input-wrap">
          <span class="input-icon">👤</span>
          <input type="text" id="reg-name" placeholder="محمد أحمد" autocomplete="name" required/>
        </div>
      </div>
      <div class="form-group">
        <label>اسم المستخدم</label>
        <div class="input-wrap">
          <span class="input-icon">@</span>
          <input type="text" id="reg-username" placeholder="mohammed99" autocomplete="username"
                 pattern="[a-z0-9_]+" title="أحرف إنجليزية صغيرة وأرقام وشرطة سفلية فقط" required/>
        </div>
      </div>
      <div class="form-group">
        <label>البريد الإلكتروني</label>
        <div class="input-wrap">
          <span class="input-icon">📧</span>
          <input type="email" id="reg-email" placeholder="example@email.com" autocomplete="email" required/>
        </div>
      </div>
      <div class="form-group">
        <label>كلمة المرور</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input type="password" id="reg-password" placeholder="6 أحرف على الأقل"
                 autocomplete="new-password" required minlength="6"/>
          <button type="button" class="toggle-password">👁</button>
        </div>
        <div class="pwd-strength"><div class="pwd-strength-bar" id="pwd-strength-bar"></div></div>
      </div>
      <div class="form-group">
        <label>تأكيد كلمة المرور</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input type="password" id="reg-password2" placeholder="أعد كتابة كلمة المرور"
                 autocomplete="new-password" required/>
          <button type="button" class="toggle-password">👁</button>
        </div>
      </div>

      <div class="error-msg" id="register-error"></div>

      <button type="submit" class="btn-primary" id="btn-register">
        إنشاء الحساب مجاناً
      </button>

      <div class="divider">أو</div>

      <button type="button" class="btn-google">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        متابعة مع Google
      </button>
    </form>

    <!-- Features -->
    <div class="features">
      <span class="feature-badge">🔒 آمن بالكامل</span>
      <span class="feature-badge">📹 فيديو 4K</span>
      <span class="feature-badge">⚡ رسائل فورية</span>
      <span class="feature-badge">👥 مجموعات</span>
    </div>

    <div class="auth-footer">
      بالتسجيل أنت توافق على <a href="#">شروط الاستخدام</a> و <a href="#">سياسة الخصوصية</a>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="auth.js"></script>

  <script>
    // Password strength indicator
    document.getElementById('reg-password')?.addEventListener('input', function() {
      const val  = this.value;
      const bar  = document.getElementById('pwd-strength-bar');
      let strength = 0;
      if (val.length >= 6) strength++;
      if (val.length >= 10) strength++;
      if (/[A-Z]/.test(val) || /[0-9]/.test(val)) strength++;
      if (/[^A-Za-z0-9]/.test(val)) strength++;
      const colors = ['#ff5c70','#ffca5c','#7c5cff','#30d28c'];
      const widths  = ['25%','50%','75%','100%'];
      bar.style.width      = val ? widths[strength-1] || '20%' : '0';
      bar.style.background = val ? colors[strength-1] || '#ff5c70' : 'transparent';
    });
  </script>
</body>
</html>
